<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Jacqueline Parfumerie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar" style="color: var(--color-text-dark); border-bottom: 1px solid rgba(42,40,38,0.1);">
        <a href="../index.html">HOME</a>
        <a href="sale.html">SALE</a>
        <a href="shop.html">SHOP</a>
        <a href="blog.html">BLOG</a>
        <a href="contact.html">CONTACT</a>
        <a href="profile.html" id="nav-profile" style="display: none;">PROFILE</a>
        <a href="login.html" id="nav-login">LOGIN</a>
        <a href="cart.html">CART (0)</a>
    </nav>

    <section class="page-section" style="max-width: 1200px; margin: 0 auto; min-height: 80vh;">
        <h1 class="title"
            style="text-align: center; margin-bottom: 4rem; color: var(--color-text-dark); font-size: clamp(3rem, 8vw, 5rem);">
            YOUR CART</h1>

        <div class="cart-container">
            <div class="cart-items" id="cart-items-container" style="flex: 2;">
                <!-- Cart items injected by JS -->
            </div>

            <div class="cart-summary"
                style="flex: 1; background: #fff; padding: 2.5rem; border: 1px solid rgba(42,40,38,0.1); height: fit-content;">
                <h3
                    style="font-family: var(--font-sans); margin-bottom: 1.5rem; letter-spacing: 0.1em; border-bottom: 1px solid rgba(42,40,38,0.1); padding-bottom: 1rem; color: var(--color-text-dark);">
                    ORDER SUMMARY</h3>
                <div
                    style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-family: var(--font-serif-body); font-size: 1.2rem; color: var(--color-text-dark);">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">$0.00</span>
                </div>
                <div
                    style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-family: var(--font-serif-body); font-size: 1.2rem; color: var(--color-text-dark);">
                    <span>Shipping</span>
                    <span>Calculated at checkout</span>
                </div>
                <div
                    style="display: flex; justify-content: space-between; margin-bottom: 2rem; font-family: var(--font-sans); font-weight: 600; font-size: 1.1rem; border-top: 1px solid rgba(42,40,38,0.1); padding-top: 1.5rem; color: var(--color-text-dark);">
                    <span>TOTAL</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button class="btn-solid" onclick="checkout()"
                    style="background-color: var(--color-text-dark); color: var(--color-text-light);">PROCEED TO
                    CHECKOUT</button>
            </div>
        </div>
    </section>

    <!-- Checkout Modal -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <h2 class="modal-title">Shipping Details</h2>
            <form id="checkout-form">
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">First Name</label>
                        <input type="text" id="order-first-name" class="form-input" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Last Name</label>
                        <input type="text" id="order-last-name" class="form-input" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="order-phone" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Shipping Address</label>
                    <textarea id="order-address" class="form-input" rows="3" required style="resize: none;"></textarea>
                </div>
                <button type="submit" class="btn-solid" id="submit-order-btn">PLACE ORDER</button>
            </form>
            <div id="order-status" style="margin-top: 1.5rem; text-align: center; font-family: var(--font-sans); display: none;"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="main.js"></script>
    <script>
        // Initialize Services
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cart-items-container');
            const subtotalEl = document.getElementById('cart-subtotal');
            const totalEl = document.getElementById('cart-total');

            container.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = '<p style="font-family: var(--font-sans); color: rgba(42,40,38,0.6);">Your cart is empty.</p>';
            } else {
                cart.forEach((item, index) => {
                    total += item.price * item.quantity;
                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.style.cssText = 'display: flex; gap: 1.5rem; border-bottom: 1px solid rgba(42,40,38,0.2); padding-bottom: 1.5rem; margin-bottom: 1.5rem;';
                    div.innerHTML = `
                        <a href="product.html?id=${item.id}">
                            <img src="${item.img}" alt="${item.name}" style="width: 120px; height: 150px; object-fit: cover;">
                        </a>
                        <div class="item-details" style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                            <a href="product.html?id=${item.id}" style="text-decoration: none; color: inherit;">
                                <h3 style="font-family: var(--font-sans); font-size: 1.1rem; margin-bottom: 0.5rem; text-transform: uppercase;">${item.name}</h3>
                            </a>
                            <p style="font-family: var(--font-serif-body); color: rgba(42,40,38,0.8); margin-bottom: 0.5rem; font-size: 1.1rem;">Size: ${item.size}</p>
                            <p style="font-family: var(--font-sans); font-weight: 500;">$${item.price}.00</p>
                        </div>
                        <div class="item-actions" style="display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end;">
                            <a href="#" onclick="removeItem(${index}); return false;" style="font-family: var(--font-sans); font-size: 0.75rem; text-decoration: underline; color: rgba(42,40,38,0.6);">REMOVE</a>
                            <input type="number" value="${item.quantity}" min="1" onchange="updateQuantity(${index}, this.value)" class="form-input" style="width: 70px; padding: 0.5rem; text-align: center; border-color: rgba(42,40,38,0.2); color: var(--color-text-dark);">
                        </div>
                    `;
                    container.appendChild(div);
                });
            }

            subtotalEl.textContent = `$${total.toFixed(2)}`;
            totalEl.textContent = `$${total.toFixed(2)}`;
            updateCartCount();
        }

        function removeItem(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCart();
        }

        function updateQuantity(index, quantity) {
            if (quantity < 1) return;
            const cart = getCart();
            cart[index].quantity = parseInt(quantity);
            saveCart(cart);
            renderCart();
        }

        // Checkout logic
        const modal = document.getElementById('checkout-modal');
        const closeBtn = document.getElementById('close-modal');
        const checkoutForm = document.getElementById('checkout-form');
        const orderStatus = document.getElementById('order-status');

        function checkout() {
            const cart = getCart();
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }
            
            // Check if user is logged in
            auth.onAuthStateChanged(user => {
                if (!user) {
                    if(confirm("You need an account to place an order. Redirect to Sign Up?")) {
                        window.location.href = 'signup.html';
                    }
                    return;
                }
                modal.style.display = 'flex';
            });
        }

        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };

        checkoutForm.onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-order-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'PLACING ORDER...';

            const user = auth.currentUser;
            const cart = getCart();
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            const orderData = {
                userId: user.uid,
                customerName: `${document.getElementById('order-first-name').value} ${document.getElementById('order-last-name').value}`,
                phone: document.getElementById('order-phone').value,
                address: document.getElementById('order-address').value,
                items: cart,
                total: total,
                status: 'Pending',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                console.log("Attempting to save order to Firestore...", orderData);
                // 1. Save to Firestore (Database)
                const docRef = await db.collection('orders').add(orderData);
                console.log("Order saved with ID:", docRef.id);
                
                // 2. Send Email Notification using FormSubmit.co
                console.log("Sending email notification...");
                const response = await fetch("https://formsubmit.co/ajax/a.sherif.student@gmail.com", {
                    method: "POST",
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        _subject: "New Order from Jacqueline Parfumerie",
                        OrderID: docRef.id,
                        CustomerName: orderData.customerName,
                        CustomerEmail: user.email,
                        PhoneNumber: orderData.phone,
                        Address: orderData.address,
                        OrderItems: cart.map(i => `${i.name} (${i.size}) x${i.quantity}`).join('\n'),
                        TotalAmount: `$${total.toFixed(2)}`
                    })
                });
                console.log("Email service response:", response.status);

                // 3. Success
                saveCart([]);
                renderCart();
                checkoutForm.reset();
                orderStatus.style.display = 'block';
                orderStatus.style.color = '#27ae60';
                orderStatus.textContent = "Order placed successfully! We've sent a notification to the owner.";
                
                setTimeout(() => {
                    modal.style.display = 'none';
                    orderStatus.style.display = 'none';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'PLACE ORDER';
                }, 3000);

            } catch (error) {
                console.error("CRITICAL ORDER ERROR:", error);
                alert("Firebase Error: " + error.message); // Show actual error to the user
                orderStatus.style.display = 'block';
                orderStatus.style.color = '#c0392b';
                orderStatus.textContent = "Error: " + error.message;
                submitBtn.disabled = false;
                submitBtn.textContent = 'PLACE ORDER';
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });
    </script>
</body>

</html>
