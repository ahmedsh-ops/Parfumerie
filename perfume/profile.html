<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Jacqueline Parfumerie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar" style="color: var(--color-text-dark); border-bottom: 1px solid rgba(42,40,38,0.1);">
        <a href="../index.html">HOME</a>
        <a href="sale.html">SALE</a>
        <a href="shop.html">SHOP</a>
        <a href="blog.html">BLOG</a>
        <a href="contact.html">CONTACT</a>
        <a href="profile.html" id="nav-profile" style="display: none;">PROFILE</a>
        <a href="login.html" id="nav-login">LOGIN</a>
        <a href="cart.html">CART (0)</a>
    </nav>

    <section class="page-section" style="max-width: 1200px; margin: 0 auto; min-height: 80vh;">
        <h1 class="title"
            style="text-align: center; margin-bottom: 4rem; color: var(--color-text-dark); font-size: clamp(3rem, 8vw, 5rem);">
            MY PROFILE</h1>

        <div id="profile-content" class="form-container" style="display: none;">
            <div style="background: #fff; padding: 3rem; border: 1px solid rgba(42,40,38,0.1);">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div id="user-initials" style="width: 80px; height: 80px; background: var(--color-bg-dark); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1rem auto; font-family: var(--font-serif-title);">JP</div>
                    <h2 id="user-full-name" style="font-family: var(--font-serif-title); font-size: 2rem; text-transform: uppercase;">User Name</h2>
                    <p id="user-email" style="font-family: var(--font-sans); color: rgba(42,40,38,0.6); font-size: 0.9rem;">user@example.com</p>
                </div>

                <div style="border-top: 1px solid rgba(42,40,38,0.1); padding-top: 2rem;">
                    <h3 style="font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 0.2em; margin-bottom: 1.5rem; text-transform: uppercase;">Account Information</h3>
                    <div style="margin-bottom: 1rem;">
                        <span style="font-family: var(--font-sans); font-size: 0.7rem; color: rgba(42,40,38,0.5); text-transform: uppercase; display: block; margin-bottom: 0.2rem;">First Name</span>
                        <span id="display-first-name" style="font-family: var(--font-serif-body); font-size: 1.2rem;">---</span>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <span style="font-family: var(--font-sans); font-size: 0.7rem; color: rgba(42,40,38,0.5); text-transform: uppercase; display: block; margin-bottom: 0.2rem;">Last Name</span>
                        <span id="display-last-name" style="font-family: var(--font-serif-body); font-size: 1.2rem;">---</span>
                    </div>
                </div>

                <div style="margin-top: 3rem; display: flex; flex-direction: column; gap: 1rem;">
                    <button class="btn-solid" onclick="logout()" style="background: var(--color-bg-dark); color: #fff;">LOG OUT</button>
                    <a href="shop.html" class="btn-solid" style="background: transparent; border: 1px solid var(--color-bg-dark); color: var(--color-bg-dark); text-align: center;">CONTINUE SHOPPING</a>
                </div>
            </div>
            
            <div style="margin-top: 4rem;">
                <h3 style="font-family: var(--font-serif-title); font-size: 1.5rem; margin-bottom: 2rem; text-transform: uppercase; text-align: center;">Order History</h3>
                <div id="order-history" style="font-family: var(--font-serif-body); text-align: center; color: rgba(42,40,38,0.6);">
                    No orders placed yet.
                </div>
            </div>
        </div>

        <div id="loading-spinner" style="text-align: center; margin-top: 5rem;">
            <p style="font-family: var(--font-sans); letter-spacing: 0.2em;">LOADING YOUR PROFILE...</p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-left">REALLYGREATSITE.COM</div>
        <div class="footer-right">@REALLYGREATSITE</div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="main.js"></script>

    <script>
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                // If not logged in, redirect to login
                window.location.href = 'login.html';
                return;
            }

            // Fetch user data from Firestore
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('display-first-name').textContent = data.firstName;
                    document.getElementById('display-last-name').textContent = data.lastName;
                    document.getElementById('user-full-name').textContent = `${data.firstName} ${data.lastName}`;
                    document.getElementById('user-email').textContent = user.email;
                    document.getElementById('user-initials').textContent = (data.firstName[0] + data.lastName[0]).toUpperCase();
                    
                    // Fetch orders
                    const ordersSnapshot = await db.collection('orders').where('userId', '==', user.uid).orderBy('createdAt', 'desc').get();
                    const orderHistoryDiv = document.getElementById('order-history');
                    
                    if (!ordersSnapshot.empty) {
                        orderHistoryDiv.innerHTML = '';
                        orderHistoryDiv.style.textAlign = 'left';
                        ordersSnapshot.forEach(orderDoc => {
                            const order = orderDoc.data();
                            const date = order.createdAt ? order.createdAt.toDate().toLocaleDateString() : 'Recently';
                            const orderDiv = document.createElement('div');
                            orderDiv.style.cssText = 'background: #fff; padding: 1.5rem; border: 1px solid rgba(42,40,38,0.1); margin-bottom: 1rem;';
                            orderDiv.innerHTML = `
                                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                    <span style="font-weight: 600; font-family: var(--font-sans); font-size: 0.8rem;">ORDER #${orderDoc.id.slice(-6).toUpperCase()}</span>
                                    <span style="color: rgba(42,40,38,0.5); font-size: 0.8rem;">${date}</span>
                                </div>
                                <p style="font-size: 1rem; margin-bottom: 0.5rem;">Total: $${order.total.toFixed(2)}</p>
                                <p style="font-size: 0.8rem; color: rgba(42,40,38,0.6);">Items: ${order.items.map(i => i.name).join(', ')}</p>
                            `;
                            orderHistoryDiv.appendChild(orderDiv);
                        });
                    }
                }

                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('profile-content').style.display = 'block';

            } catch (error) {
                console.error("Error loading profile:", error);
                alert("Error loading profile data.");
            }
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.href = '/index.html';
            });
        }
    </script>
</body>

</html>
