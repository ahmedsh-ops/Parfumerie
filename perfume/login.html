<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jacqueline Parfumerie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="auth-page">
        <div class="auth-image">
            <img src="https://i.pinimg.com/1200x/cb/06/9d/cb069d46828e7845534f5b45a1ffad18.jpg"
                alt="Perfume aesthetics">
            <a href="/index.html"
                style="position: absolute; top: 2rem; left: 2rem; color: white; font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase;">&larr;
                BACK TO HOME</a>
        </div>
        <div class="auth-form-wrapper">
            <div class="form-container">
                <h1 class="auth-title">Welcome Back</h1>
                <form>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" required>
                    </div>
                    <button type="submit" class="btn-solid" style="margin-top: 1rem;">Log In</button>
                </form>
                <div class="auth-links" style="text-align: center;">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
