<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jacqueline Parfumerie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar" style="color: var(--color-text-dark); border-bottom: 1px solid rgba(42,40,38,0.1);">
        <a href="index.html">HOME</a>
        <a href="sale.html">SALE</a>
        <a href="shop.html">SHOP</a>
        <a href="blog.html">BLOG</a>
        <a href="contact.html">CONTACT</a>
        <a href="login.html">LOGIN</a>
    </nav>

    <section class="page-section" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="form-container">
            <h1 class="title" style="text-align: center; font-size: clamp(3rem, 8vw, 5rem); margin-bottom: 2rem;">CONTACT</h1>
            <p class="promo-desc dark-text" style="color: rgba(42,40,38,0.8); text-align: center;">We would love to hear from you.</p>
            <form>
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea class="form-input" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-solid" style="margin-top: 1rem;">Send Message</button>
            </form>
        </div>
    </section>

    <footer class="footer" style="background-color: var(--color-bg-dark); color: var(--color-text-light);">
        <div class="footer-left">REALLYGREATSITE.COM</div>
        <div class="footer-right">@REALLYGREATSITE</div>
    </footer>
</body>
</html>
