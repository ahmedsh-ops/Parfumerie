<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale - Jacqueline Parfumerie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" style="background-color: var(--color-bg-dark); color: var(--color-text-light);">
        <a href="index.html">HOME</a>
        <a href="sale.html">SALE</a>
        <a href="shop.html">SHOP</a>
        <a href="blog.html">BLOG</a>
        <a href="contact.html">CONTACT</a>
        <a href="login.html">LOGIN</a>
        <a href="cart.html">CART (0)</a>
    </nav>

    <header class="inner-hero">
        <h1 class="title">SALE</h1>
        <p class="subtitle" style="margin-top: 1rem;">Exclusive Offers</p>
    </header>

    <section class="promo-section" style="padding-top: 4rem;">
        <div class="product-grid" id="sale-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 3rem; max-width: 1200px;">
            <!-- Products will be injected here by JS -->
        </div>
    </section>

    <footer class="footer">
        <div class="footer-left">REALLYGREATSITE.COM</div>
        <div class="footer-right">@REALLYGREATSITE</div>
    </footer>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('sale-grid');
            grid.innerHTML = ''; // clear
            
            // Get 5 products for sale
            const saleProducts = products.slice(0, 5);
            
            saleProducts.forEach(p => {
                const item = document.createElement('div');
                item.className = 'product';
                // Calculate discounted price (e.g. 20% off)
                const discountedPrice = Math.floor(p.price * 0.8);
                
                item.innerHTML = `
                    <a href="product.html?id=${p.id}" style="text-decoration: none; display: flex; flex-direction: column; align-items: center; width: 100%;">
                        <div class="product-img-wrapper" style="position: relative;">
                            <img src="${p.img}" alt="${p.name}">
                            <div style="position: absolute; top: 10px; right: 10px; background: red; color: white; padding: 0.2rem 0.5rem; font-family: var(--font-sans); font-size: 0.6rem; letter-spacing: 0.1em;">SALE</div>
                        </div>
                        <p class="prod-num" style="color: rgba(255, 255, 255, 0.7);">NO. ${p.id}</p>
                        <p class="prod-name" style="color: #fff;">${p.name}</p>
                        <p class="italic" style="margin-top:0.5rem; color: #fff;">
                            <span style="text-decoration:line-through; opacity:0.6; margin-right: 0.5rem;">$${p.price}</span> $${discountedPrice}
                        </p>
                    </a>
                `;
                grid.appendChild(item);
            });
        });
    </script>
</body>
</html>
