<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - Jacqueline Parfumerie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar" style="color: var(--color-text-dark); border-bottom: 1px solid rgba(42,40,38,0.1);">
        <a href="/index.html">HOME</a>
        <a href="sale.html">SALE</a>
        <a href="shop.html">SHOP</a>
        <a href="blog.html">BLOG</a>
        <a href="contact.html">CONTACT</a>
        <a href="login.html">LOGIN</a>
        <a href="cart.html">CART (0)</a>
    </nav>

    <!-- Product Details -->
    <section class="page-section product-details" id="product-container" style="display: none;">
        <div class="product-image" style="flex: 1;">
            <img id="prod-img" src="" alt="Perfume"
                style="width: 100%; max-width: 500px; height: auto; object-fit: cover; margin: 0 auto; display: block;">
        </div>
        <div class="product-info" style="flex: 1;">
            <p id="prod-num" class="subtitle" style="color: rgba(42,40,38,0.6); margin-bottom: 0.5rem;"></p>
            <h1 id="prod-title" class="title"
                style="font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 1rem; color: var(--color-text-dark);"></h1>
            <p id="prod-price" class="price"
                style="font-family: var(--font-sans); font-size: 1.5rem; font-weight: 500; margin-bottom: 2rem; color: var(--color-text-dark);">
            </p>

            <p class="description dark-text" style="color: rgba(42,40,38,0.8); margin-left: 0; max-width: none;">A
                vibrant and uplifting fragrance that captures the essence of a Mediterranean summer. The elegant notes
                yield to a subtle, sophisticated heart. A perfect signature scent.</p>

            <div class="options" style="margin-bottom: 2rem;">
                <label class="form-label" style="color: var(--color-text-dark);">Size</label>
                <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                    <button class="size-btn active" data-size="50 ML" onclick="selectSize(this)">50 ML</button>
                    <button class="size-btn" data-size="100 ML" onclick="selectSize(this)">100 ML</button>
                </div>
            </div>

            <div class="options" style="margin-bottom: 2rem;">
                <label class="form-label" style="color: var(--color-text-dark);">Quantity</label>
                <input type="number" id="prod-qty" value="1" min="1" class="form-input"
                    style="width: 100px; padding: 0.8rem; border-color: rgba(42,40,38,0.2); color: var(--color-text-dark);">
            </div>

            <button id="add-to-cart-btn" class="btn-solid"
                style="background-color: var(--color-text-dark); color: var(--color-text-light); font-size: 1rem; padding: 1.2rem; width: 100%; max-width: 300px;">ADD
                TO CART</button>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-left">REALLYGREATSITE.COM</div>
        <div class="footer-right">@REALLYGREATSITE</div>
    </footer>

    <script src="main.js"></script>
    <script>
        let currentProduct = null;
        let selectedSize = '50 ML';

        function selectSize(btn) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSize = btn.dataset.size;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id')) || 1; // Default to product 1

            currentProduct = products.find(p => p.id === id);

            if (currentProduct) {
                document.getElementById('product-container').style.display = 'flex';
                document.getElementById('prod-img').src = currentProduct.img;
                document.getElementById('prod-img').alt = currentProduct.name;
                document.getElementById('prod-num').textContent = `NO. ${currentProduct.id}`;
                document.getElementById('prod-title').textContent = currentProduct.name;
                document.getElementById('prod-price').textContent = `$${currentProduct.price}.00`;
                document.title = `${currentProduct.name} - Jacqueline Parfumerie`;
            }

            document.getElementById('add-to-cart-btn').addEventListener('click', () => {
                const qty = document.getElementById('prod-qty').value;
                addToCart(currentProduct, selectedSize, qty);
                // Optionally redirect to cart page
                // window.location.href = 'cart.html';
                alert('Added to cart!');
            });
        });
    </script>
</body>

</html>
